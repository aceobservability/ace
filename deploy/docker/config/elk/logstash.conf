input {
  beats {
    port => 5044
  }
  tcp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  mutate {
    remove_field => ["@version", "host"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "logs-%{+YYYY.MM.dd}"
  }
}
