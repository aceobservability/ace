{{- if .Values.vmalert.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: vmalert
  labels:
    app.kubernetes.io/name: vmalert
spec:
  selector:
    app.kubernetes.io/name: vmalert
  ports:
    - name: http
      port: 8880
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  labels:
    app.kubernetes.io/name: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmalert
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmalert
    spec:
      containers:
        - name: vmalert
          image: {{ .Values.vmalert.image | quote }}
          args:
            - -datasource.url=http://victoria-metrics:8428
            - -notifier.url=http://alertmanager:9093
            - -remoteRead.url=http://victoria-metrics:8428
            - -remoteWrite.url=http://victoria-metrics:8428
            - -httpListenAddr=:8880
          ports:
            - name: http
              containerPort: 8880
{{- end }}
