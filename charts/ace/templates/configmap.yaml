apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ace.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace.labels" . | nindent 4 }}
data:
  # Backend configuration (non-sensitive)
  PROMETHEUS_URL: {{ include "ace.prometheusURL" . | quote }}
  {{- with (include "ace.valkeyURL" .) }}
  {{- if . }}
  VALKEY_URL: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.backend.otlp.enabled }}
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "ace.otlpEndpoint" . | quote }}
  {{- end }}
  {{- if .Values.backend.baseURL }}
  BASE_URL: {{ .Values.backend.baseURL | quote }}
  {{- end }}
  {{- if .Values.backend.frontendURL }}
  FRONTEND_URL: {{ .Values.backend.frontendURL | quote }}
  {{- end }}
  {{- if .Values.backend.posthog.enabled }}
  POSTHOG_ENABLED: "true"
  {{- with .Values.backend.posthog.host }}
  POSTHOG_HOST: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.backend.extraEnv }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  # Frontend nginx config
  nginx.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }
    }
