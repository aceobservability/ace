{{- if .Values.rbac.create -}}
# ClusterRole for VMAgent to scrape metrics from all namespaces.
# The k8s-stack subchart creates its own RBAC, but this covers
# any additional scraping needs and the Ace service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ace.fullname" . }}-metrics-reader
  labels:
    {{- include "ace.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /metrics
      - /metrics/cadvisor
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ace.fullname" . }}-metrics-reader
  labels:
    {{- include "ace.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ace.fullname" . }}-metrics-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "ace.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
