{{- if .Values.networkPolicy.enabled -}}
# Backend network policy — allow ingress from frontend and ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ace.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ace.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from frontend pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "ace.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8080
          protocol: TCP
    # Allow from ingress controller (if using ingress)
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerLabels | nindent 14 }}
      ports:
        - port: 8080
          protocol: TCP
    {{- end }}
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow all egress (DB, VictoriaMetrics, external APIs)
    - to: []
---
# Frontend network policy — allow ingress from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ace.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ace.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerLabels | nindent 14 }}
      ports:
        - port: 8080
          protocol: TCP
    {{- end }}
    # Also allow direct access (NodePort, LoadBalancer)
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Frontend (nginx) only needs DNS — all API calls go through the browser
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
