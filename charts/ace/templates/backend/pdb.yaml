{{- if .Values.backend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ace.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace.backend.labels" . | nindent 4 }}
spec:
  {{- if .Values.backend.pdb.minAvailable }}
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.backend.pdb.maxUnavailable | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ace.backend.selectorLabels" . | nindent 6 }}
{{- end }}
